<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Graph · Video Curation Dashboard</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  <style>
    .graph-wrap { height: calc(100vh - 150px); min-height: 640px; }
    .graph-iframe { width: 100%; height: 100%; border: 1px solid #2a2a2a; border-radius: 8px; background: #111; }
    .topbar .nav-links { display:flex; gap:12px; margin-top:6px; }
    .topbar .nav-links a { color:#9ecbff; text-decoration:none; font-size:14px; }
  </style>
</head>
<body>
  <header class="topbar">
    <div>
      <h1>Graph</h1>
      <p class="muted">Neo4j Browser embedded behind dashboard auth</p>
      <div class="nav-links">
        <a href="{{ url_for('dashboard') }}">← Review Dashboard</a>
      </div>
    </div>
    <div class="top-actions">
      <form method="post" action="{{ url_for('logout') }}">
        <button type="submit" class="secondary">Log out</button>
      </form>
    </div>
  </header>

  <main class="graph-wrap">
    <iframe class="graph-iframe" src="{{ url_for('neo4j_proxy', path='browser/') }}" title="Neo4j Browser"></iframe>
  </main>
</body>
</html>
