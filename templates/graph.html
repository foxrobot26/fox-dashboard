<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Graph · Video Curation Dashboard</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  <script src="https://unpkg.com/vis-network@9.1.9/dist/vis-network.min.js"></script>
  <style>
    .layout { display: grid; grid-template-columns: 300px 1fr 340px; gap: 16px; min-height: calc(100vh - 170px); }
    .panel { border: 1px solid #2a2a2a; border-radius: 8px; padding: 12px; background: #171717; }
    .controls { display: flex; gap: 8px; margin-bottom: 10px; align-items: center; }
    .controls input[type="text"], .controls input[type="number"] { flex: 1; }
    .muted-xs { font-size: 12px; color: #8d8d8d; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
    #graphCanvas { height: calc(100vh - 230px); min-height: 520px; border: 1px solid #2a2a2a; border-radius: 8px; background: #111; }
    #topList { list-style: none; margin: 0; padding: 0; display: grid; gap: 6px; }
    #topList button { width: 100%; text-align: left; }
    .topbar .nav-links { display:flex; gap:12px; margin-top:6px; }
    .topbar .nav-links a { color:#9ecbff; text-decoration:none; font-size:14px; }
    .detail h3 { margin: 0 0 8px 0; }
    .detail h4 { margin: 10px 0 6px 0; font-size: 13px; }
    .pill { display: inline-block; border: 1px solid #3a3a3a; border-radius: 999px; padding: 2px 8px; margin: 0 6px 6px 0; font-size: 12px; }
    .kv { display:grid; grid-template-columns: 1fr; gap:6px; }
    .kv-item { background:#121212; border:1px solid #2a2a2a; border-radius:6px; padding:6px 8px; font-size:12px; }
    .list-compact { list-style:none; margin:0; padding:0; display:grid; gap:4px; max-height: 160px; overflow:auto; }
    .list-compact li { border:1px solid #2a2a2a; border-radius:6px; padding:4px 6px; font-size:12px; background:#121212; }
    .chunk-box { white-space: pre-wrap; background:#101010; border:1px solid #2a2a2a; border-radius:6px; padding:8px; max-height: 220px; overflow:auto; font-size:12px; }
  </style>
</head>
<body>
  <header class="topbar">
    <div>
      <h1>Graph Explorer</h1>
      <p class="muted">Entity graph powered by server-side Neo4j APIs</p>
      <div class="nav-links">
        <a href="{{ url_for('dashboard') }}">← Review Dashboard</a>
      </div>
    </div>
    <div class="top-actions">
      <form method="post" action="{{ url_for('logout') }}">
        <button type="submit" class="secondary">Log out</button>
      </form>
    </div>
  </header>

  <main class="layout">
    <section class="panel">
      <div class="controls">
        <input id="searchInput" type="text" placeholder="Search entity name" />
        <button id="searchBtn" type="button">Search</button>
      </div>
      <div class="controls">
        <button id="hops1" type="button" class="secondary">1 hop</button>
        <button id="hops2" type="button" class="secondary">2 hops</button>
      </div>
      <div class="controls muted-xs">
        <label><input id="toggleEpisodic" type="checkbox" /> Show Episodic</label>
      </div>
      <div class="controls muted-xs">
        <label><input id="toggleEntityOnly" type="checkbox" /> Entity-only relations</label>
      </div>
      <div class="controls muted-xs">
        <label for="minDegree">Min degree</label>
        <input id="minDegree" type="number" min="0" value="0" style="max-width:90px;" />
      </div>
      <p id="status" class="muted-xs">Ready.</p>
      <hr style="border-color:#2a2a2a; margin: 12px 0;" />
      <h3 style="margin:0 0 8px 0;">Top entities</h3>
      <ul id="topList"></ul>
    </section>

    <section>
      <div id="graphCanvas"></div>
    </section>

    <section class="panel detail" id="detailPanel">
      <h3>Inspector</h3>
      <p class="muted-xs">Click a node or edge in the graph.</p>
      <div id="detailBody" class="muted-xs"></div>
    </section>
  </main>

  <script>
    const statusEl = document.getElementById('status');
    const searchInput = document.getElementById('searchInput');
    const topList = document.getElementById('topList');
    const detailBody = document.getElementById('detailBody');
    const toggleEpisodic = document.getElementById('toggleEpisodic');
    const toggleEntityOnly = document.getElementById('toggleEntityOnly');
    const minDegree = document.getElementById('minDegree');
    let currentHops = 1;
    let rawPayload = { nodes: [], edges: [] };
    let nodeById = new Map();
    let edgeById = new Map();

    const visData = { nodes: new vis.DataSet([]), edges: new vis.DataSet([]) };

    const network = new vis.Network(document.getElementById('graphCanvas'), visData, {
      autoResize: true,
      interaction: { hover: true, selectConnectedEdges: false },
      nodes: {
        shape: 'dot',
        size: 14,
        font: { color: '#e6e6e6' },
        color: {
          highlight: { border: '#ff3b30', background: '#ff3b30' },
          hover: { border: '#ff3b30', background: '#ff3b30' }
        },
        chosen: {
          node: (values) => {
            values.color = '#ff3b30';
            values.borderColor = '#ff3b30';
          }
        }
      },
      edges: {
        color: { color: '#6f6f6f', highlight: '#6f6f6f', hover: '#ff3b30' },
        arrows: { to: { enabled: false } },
        smooth: true,
        font: { color: '#cfcfcf', size: 10 },
        chosen: {
          edge: (values) => {
            values.color = '#ff3b30';
          }
        }
      },
      physics: { stabilization: true, barnesHut: { gravitationalConstant: -4500 } }
    });

    function setStatus(msg, isError = false) {
      statusEl.textContent = msg;
      statusEl.style.color = isError ? '#ff9b9b' : '#8d8d8d';
    }

    function esc(v) {
      return String(v ?? '').replaceAll('&', '&amp;').replaceAll('<', '&lt;').replaceAll('>', '&gt;');
    }

    function formatProps(props) {
      const entries = Object.entries(props || {});
      if (!entries.length) return '<p class="muted-xs">No properties.</p>';
      return `<div class="kv">${entries.map(([k, v]) => `<div class="kv-item"><span class="mono">${esc(k)}</span>: ${esc(typeof v === 'string' ? v : JSON.stringify(v))}</div>`).join('')}</div>`;
    }

    async function getJson(url) {
      const res = await fetch(url, { credentials: 'same-origin' });
      const data = await res.json().catch(() => ({}));
      if (!res.ok || data.ok === false) throw new Error(data.error || `Request failed (${res.status})`);
      return data;
    }

    function applyFilters() {
      const showEpisodic = toggleEpisodic.checked;
      const entityOnly = toggleEntityOnly.checked;
      const minDeg = Math.max(0, Number(minDegree.value || 0));

      const nodes = (rawPayload.nodes || []).filter((n) => {
        if (!showEpisodic && n.is_episodic) return false;
        if (Number(n.degree || 0) < minDeg) return false;
        return true;
      }).map((n) => ({
        id: n.id,
        label: n.label || n.id,
        group: n.group || 'Entity',
        value: Math.max(1, Number(n.degree || 1)),
        shape: n.is_episodic ? 'square' : 'dot',
        title: `${n.label || n.id} (${n.degree || 0})`
      }));

      const idSet = new Set(nodes.map((n) => String(n.id)));
      const edges = (rawPayload.edges || []).filter((e) => idSet.has(String(e.from)) && idSet.has(String(e.to))).filter((e) => {
        if (!entityOnly) return true;
        const from = nodeById.get(String(e.from));
        const to = nodeById.get(String(e.to));
        return from && to && !from.is_episodic && !to.is_episodic;
      }).map((e, idx) => {
        const id = `${e.from}->${e.to}:${e.label || ''}:${idx}`;
        const row = { ...e, _id: id };
        edgeById.set(id, row);
        return {
          id,
          from: e.from,
          to: e.to,
          label: e.label || '',
          title: e.fact || ''
        };
      });

      visData.nodes.clear();
      visData.edges.clear();
      visData.nodes.add(nodes);
      visData.edges.add(edges);
      network.fit({ animation: true });
      setStatus(`Showing ${nodes.length} nodes / ${edges.length} edges.`);
    }

    function renderNodeDetail(nodeId) {
      const n = nodeById.get(String(nodeId));
      if (!n) return;
      const labels = (n.labels || []).map((l) => `<span class="pill">${esc(l)}</span>`).join('') || '<span class="muted-xs">None</span>';
      const linkedEpisodes = (n.linked_episodes || []).map((x) => `<li>${esc(x)}</li>`).join('') || '<li class="muted-xs">None</li>';
      const linkedEntities = (n.linked_entities || []).map((x) => `<li>${esc(x)}</li>`).join('') || '<li class="muted-xs">None</li>';

      const props = n.props || {};
      const chunkText = props.chunk_text || props.text || props.content || '';
      const sourceMeta = {
        source: props.source || props.source_url || props.url || '',
        source_id: props.source_id || '',
        doc_id: props.doc_id || props.document_id || '',
        chunk_id: props.chunk_id || '',
      };

      detailBody.innerHTML = `
        <h4>Node: <span class="mono">${esc(n.label || n.id)}</span></h4>
        <p class="muted-xs">Degree: ${esc(n.degree || 0)} · ID: <span class="mono">${esc(n.id)}</span></p>
        <h4>Labels</h4>
        <div>${labels}</div>
        <h4>Properties</h4>
        ${formatProps(props)}
        <h4>Linked episodes</h4>
        <ul class="list-compact">${linkedEpisodes}</ul>
        <h4>Linked entities</h4>
        <ul class="list-compact">${linkedEntities}</ul>
        ${n.is_episodic ? `
          <h4>Episode drill-down</h4>
          <p class="muted-xs">Chunk text</p>
          <div class="chunk-box">${esc(chunkText || 'No chunk text property found.')}</div>
          <p class="muted-xs" style="margin-top:8px;">Source metadata</p>
          ${formatProps(sourceMeta)}
        ` : ''}
      `;
    }

    function renderEdgeDetail(edgeId) {
      const e = edgeById.get(String(edgeId));
      if (!e) return;
      const supportIds = Array.isArray(e.support_episode_ids) ? e.support_episode_ids : [];
      detailBody.innerHTML = `
        <h4>Edge: <span class="mono">${esc(e.label || e.rel_type || 'REL')}</span></h4>
        <p class="muted-xs">From <span class="mono">${esc(e.from)}</span> to <span class="mono">${esc(e.to)}</span></p>
        <h4>Fact</h4>
        <div class="chunk-box">${esc(e.fact || 'No fact text.')}</div>
        <h4>Properties</h4>
        ${formatProps(e.props || {})}
        <h4>Episode support IDs</h4>
        <ul class="list-compact">${supportIds.length ? supportIds.map((x) => `<li>${esc(x)}</li>`).join('') : '<li class="muted-xs">None</li>'}</ul>
      `;
    }

    async function loadNeighbors(entity) {
      if (!entity) return;
      setStatus(`Loading neighbors for ${entity}...`);
      try {
        const data = await getJson(`/api/graph/neighbors?entity=${encodeURIComponent(entity)}&hops=${currentHops}&limit=120`);
        rawPayload = data;
        nodeById = new Map((data.nodes || []).map((n) => [String(n.id), n]));
        edgeById = new Map();
        applyFilters();
      } catch (err) {
        setStatus(err.message, true);
      }
    }

    async function doSearch() {
      const q = (searchInput.value || '').trim();
      if (!q) return setStatus('Enter a search term.', true);
      setStatus(`Searching for "${q}"...`);
      try {
        const data = await getJson(`/api/graph/search?q=${encodeURIComponent(q)}&limit=10`);
        const first = (data.nodes || [])[0];
        if (!first) return setStatus('No entity match found.', true);
        await loadNeighbors(first.id);
      } catch (err) {
        setStatus(err.message, true);
      }
    }

    async function loadTop() {
      try {
        const data = await getJson('/api/graph/top?limit=15');
        topList.innerHTML = '';
        for (const n of data.nodes || []) {
          if (n.is_episodic) continue;
          const li = document.createElement('li');
          const btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'secondary';
          btn.textContent = `${n.label} (${n.degree || 0})`;
          btn.addEventListener('click', () => {
            searchInput.value = n.id;
            loadNeighbors(n.id);
          });
          li.appendChild(btn);
          topList.appendChild(li);
        }
      } catch (err) {
        setStatus(`Top entities failed: ${err.message}`, true);
      }
    }

    document.getElementById('searchBtn').addEventListener('click', doSearch);
    searchInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') doSearch(); });
    document.getElementById('hops1').addEventListener('click', () => { currentHops = 1; setStatus('Hop depth set to 1.'); });
    document.getElementById('hops2').addEventListener('click', () => { currentHops = 2; setStatus('Hop depth set to 2.'); });
    toggleEpisodic.addEventListener('change', applyFilters);
    toggleEntityOnly.addEventListener('change', applyFilters);
    minDegree.addEventListener('input', applyFilters);

    network.on('selectNode', (params) => {
      if (!params.nodes || !params.nodes.length) return;
      // Force node-only selection coloring, keep connected edges unhighlighted.
      network.selectNodes(params.nodes, false);
      renderNodeDetail(params.nodes[0]);
    });

    network.on('selectEdge', (params) => {
      if (!params.edges || !params.edges.length) return;
      renderEdgeDetail(params.edges[0]);
    });

    network.on('deselectNode', () => {
      detailBody.innerHTML = '<p class="muted-xs">Click a node or edge in the graph.</p>';
    });

    loadTop();
  </script>
</body>
</html>
